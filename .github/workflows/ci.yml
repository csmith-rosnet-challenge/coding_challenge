name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0.x'
      - name: Build API
        run: dotnet build ./packages/TodoApi/TodoApi.csproj --configuration Release
      - name: Frontend placeholder
        run: echo "Frontend build will be added later"
